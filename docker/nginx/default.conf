server {
  listen 80;
  server_name localhost;
  root /app;
  index index.php;

  client_max_body_size 5M;

  location ~ /\.(?!well-known).* {
    deny all;
  }

  location ~ ^/(config|src|vendor|templates|docker|tests|coverage-report|\.phpunit\.cache|\.agents|\.codex)(/|$) {
    deny all;
  }

  location ~ ^/(composer\.(json|lock)|docker-compose\.yml|README\.txt|todo\.md|phpunit\.xml)$ {
    deny all;
  }

  location ~ ^/public/uploads/.*\.php$ {
    return 403;
  }

  location ^~ /public/uploads/ {
    try_files $uri =404;
  }

  location ^~/public/ {
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.php$is_args$args;
  }

  location ~ ^/index\.php$ {
    include fastcgi_params;
    fastcgi_pass php:9000;
    fastcgi_param SCRIPT_FILENAME /app/index.php;
  }

  location ~\.php$ {
    return 404;
  }
}