server {
  listen 80;
  server_name localhost;
  root /app;
  index index.php;

  client_max_body_size 20M;

  location /public/ {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.php$is_args$args;
  }

  location ~\.php$ {
    include fastcgi_params;
    fastcgi_pass php:9000;
    fastcgi_param SCRIPT_FILENAME /app$fastcgi_script_name;
  }
}